[yapf]
BASED_ON_STYLE = pep8
BLANK_LINE_BEFORE_NESTED_CLASS_OR_DEF = true
SPLIT_BEFORE_EXPRESSION_AFTER_OPENING_PAREN = true
COLUMN_LIMIT = 100

[isort]
line_length = 100
multi_line_output = 0
known_standard_library = setuptools
known_third_party = cv2,imageio,indoor3d_util,load_scannet_data,lyft_dataset_sdk,m2r,matplotlib,mmcv,mmdet,mmengine,munch,nuimages,numba,numpy,nuscenes,pandas,plyfile,pycocotools,pyquaternion,pytest,pytorch_sphinx_theme,recommonmark,requests,scannet_util,scannet_utils,scipy,seaborn,shapely,skimage,sklearn,sphinx,spconv,tensorboardX,tensorflow,terminaltables,torch,trimesh,tqdm,ts,waymo_open_dataset,yaml
no_lines_before = STDLIB,LOCALFOLDER
default_section = THIRDPARTY

[codespell]
ignore-words-list = ans,refridgerator,crate,hist,formating,dout,wan,nd,fo,avod,AVOD,warmup

[flake8]
per-file-ignores = mmdet3d/configs/*:F401,F403,F405
